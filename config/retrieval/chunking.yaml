chunking:
  strategy: semantic
  max_chunk_size: 1500
  overlap: 200
  separators:
    - "\n## "
    - "\n### "
    - "\n\n"
    - "\n"
  code_aware: true
  code_separators:
    sas:
      - "%macro "
      - "proc "
      - "data "
    r:
      - "^\\w+\\s*<-\\s*function"
    python:
      - "^def "
      - "^class "
