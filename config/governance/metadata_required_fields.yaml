metadata_required_fields:
  always_required:
    - asset_id
    - title
    - asset_type
    - language
    - status
    - tags
    - created_by
    - created_at
    - version

  required_on_promotion:
    - description
    - task_types
    - file_path

  required_for_production:
    - source_doc
    - review_notes
