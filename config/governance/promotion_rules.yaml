promotion_rules:
  draft_to_tested:
    requires:
      - metadata_valid
      - dependency_valid
      - syntax_valid
    optional:
      - run_valid
    auto_promote: false

  tested_to_reviewer_approved:
    requires:
      - human_review_approved
      - review_note_exists
    auto_promote: false

  reviewer_approved_to_production_approved:
    requires:
      - second_review_approved
      - review_note_level_production
    auto_promote: false

  to_deprecated:
    requires:
      - deprecation_reason_provided
    notify_dependents: true
