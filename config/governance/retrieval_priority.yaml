retrieval_priority:
  order:
    - status: production_approved
      weight: 1.0
      use_as_output: true
    - status: reviewer_approved
      weight: 0.85
      use_as_output: true
    - status: tested
      weight: 0.6
      use_as_output: false
    - source: memory/solved_patterns
      weight: 0.5
      use_as_output: false
    - status: draft
      weight: 0.3
      use_as_output: false
    - source: assets/failed_cases
      weight: 0.2
      use_as_output: false
      role: negative_example

  max_results: 10
  min_relevance_score: 0.3
